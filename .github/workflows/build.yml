name: Build mod

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lz4
        run: pip install lz4

      - name: Build hqz.arz
        run: python3 build_mod.py dist/hqz/database/hqz.arz

      - name: Package mod
        run: cd dist && zip -r ../hqz-mod.zip hqz/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hqz-mod
          path: hqz-mod.zip
