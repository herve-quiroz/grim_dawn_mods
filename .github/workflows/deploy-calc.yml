name: Deploy calculator to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'tools/calc/**'
      - '.github/workflows/deploy-calc.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install and build
        working-directory: tools/calc
        run: |
          npm ci
          npm run build
          npm test

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: tools/calc

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
